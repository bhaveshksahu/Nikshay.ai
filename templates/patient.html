<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NikshayAI - TB Tracker</title>
<style>
:root {
  --primary: #00897b;
  --primary-dark: #00695c;
  --accent: #8bc34a;
  --bg-soft: #f1f8e9;
  --text-dark: #2c3e50;
  --text-muted: #607d8b;
  --white: #ffffff;
}

*{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background-color: var(--bg-soft);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  background: var(--white);
  border-radius: 24px;
  padding: 32px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 10px 25px rgba(0,137,123,0.1);
}

.logo {
  color: var(--primary);
  font-size: 28px;
  font-weight: 800;
  display: flex;
  align-items: center;
  gap: 8px;
}

.tagline {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 24px;
}

.greeting {
  background: #e0f2f1;
  padding: 15px;
  border-radius: 12px;
  color: var(--text-dark);
  font-size: 16px;
  margin-bottom: 20px;
  line-height: 1.5;
}

.upload-area {
  border: 2px dashed #b2dfdb;
  border-radius: 16px;
  padding: 30px 20px;
  text-align: center;
  cursor: pointer;
  margin-bottom: 20px;
  background: #fafafa;
}

#preview {
  width: 100%;
  border-radius: 12px;
  margin-top: 15px;
  display: none;
  max-height: 250px;
  object-fit: cover;
}

.btn {
  width: 100%;
  background: var(--primary);
  color: white;
  border: none;
  padding: 18px;
  border-radius: 14px;
  font-size: 18px;
  cursor: pointer;
  font-weight: 600;
}

#result {
  margin-top: 20px;
  padding: 18px;
  border-radius: 12px;
  display: none;
}

.confirmed { background: #e8f5e9; border-left: 5px solid var(--accent); color: #2e7d32; }
.unclear { background: #fff3e0; border-left: 5px solid #ff9800; color: #e65100; }
.spinner { display: none; text-align: center; padding: 15px; color: var(--primary); }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="var(--primary)"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
    NikshayAI
  </div>
  <div class="tagline">Daily Treatment Tracker</div>
  
  <div class="greeting">
    Hello, <strong>{{ name }}</strong><br>
    <span style="font-size: 13px; color: var(--text-muted)">Please upload a photo of today's medicine.</span>
  </div>

  <div class="upload-area" onclick="document.getElementById('photo').click()">
    <div id="upload-placeholder">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <div style="color:var(--primary); font-weight:700; margin-top:10px;">Take Photo</div>
      <div style="font-size:12px; color:var(--text-muted);">Hold the pill in your hand and click</div>
    </div>
    <input type="file" id="photo" accept="image/*" capture="environment">
    <img id="preview">
  </div>

  <button class="btn" onclick="submitDose()" id="btn">Confirm Dose</button>
  
  <div class="spinner" id="spinner">Gemini AI is checking...</div>
  
  <div id="result"></div>
</div>

<script>
document.getElementById('photo').onchange = function() {
  const f = this.files[0]; if (!f) return;
  document.getElementById('preview').src = URL.createObjectURL(f);
  document.getElementById('preview').style.display = 'block';
  document.getElementById('upload-placeholder').style.display = 'none';
};

async function submitDose() {
  const f = document.getElementById('photo').files[0];
  if (!f) { alert('Please take a photo of the pill first!'); return; }
  
  const btn = document.getElementById('btn');
  const spinner = document.getElementById('spinner');
  const result = document.getElementById('result');

  btn.disabled = true; 
  btn.textContent = 'Verifying...';
  spinner.style.display = 'block';
  result.style.display = 'none';

  try {
    const fd = new FormData();
    fd.append('photo', f);
    
    // --> THE MISSING LINE: Tells the backend WHICH patient is uploading <--
    fd.append('patient_id', '{{ patient_id }}'); 

    const r = await fetch('/verify-dose', {method:'POST', body:fd});
    const d = await r.json();
    
    result.style.display = 'block';
    if (d.pill_visible) {
      result.className = 'confirmed';
      result.innerHTML = '<strong>✓ Thank you!</strong><br>Your dose has been recorded. Stay healthy!';
    } else {
      result.className = 'unclear';
      result.innerHTML = '<strong>⚠ Photo is not clear</strong><br>Please try again with the pill in better light.';
    }
  } catch(e) {
    alert('Connection error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Confirm Dose';
    spinner.style.display = 'none';
  }
}
</script>
</body>
</html>
